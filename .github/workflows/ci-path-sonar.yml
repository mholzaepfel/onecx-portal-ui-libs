name: Monorepo SonarQube Analysis

on:
  workflow_call:

jobs:
  find-paths:
    runs-on: ubuntu-latest
    outputs:
      paths: ${{ steps.set-paths.outputs.paths }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Find project paths
        id: set-paths
        run: |
          paths=$(find libs -type d -maxdepth 1 -mindepth 1 -exec basename {} \;)
          echo "paths=$(echo $paths | jq -R -s -c 'split(\"\\n\")[:-1]')" >> $GITHUB_ENV
          echo "Found paths: $paths"

  sonar-analysis:
    needs: find-paths
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Run SonarQube Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_URL: 'https://sonarcloud.io'
          paths: ${{ needs.find-paths.outputs.paths }}
        run: |
          for path in $(echo ${{ env.paths }} | jq -r '.[]'); do
            echo "Running SonarQube analysis for $path"
            sonar-scanner \
              -Dsonar.projectKey=$path \
              -Dsonar.sources=$path \
              -Dsonar.host.url=$SONAR_URL \
              -Dsonar.organization=${{ github.repository_owner }} \
              -Dsonar.sourceEncoding=UTF-8 \
              -Dsonar.testExecutionReportPaths=./reports/$path/sonarqube_report.xml \
              -Dsonar.javascript.lcov.reportPaths=./reports/$path/coverage/lcov.info \
              -Dsonar.javascript.maximumFunctionParameters=10 \
              -Dsonar.typescript.maximumFunctionParameters=10 \
              -Dsonar.cdp.javascript.maximumFunctionParameters=10 \
              -Dsonar.cdp.typescript.maximumFunctionParameters=10 \
              -Dsonar.javascript.exclusions=src/app/shared/generated/**/* \
              -Dsonar.coverage.exclusions=*.ts,*.js,src/*.ts,src/**/*.module.ts,src/**/*.main.ts,src/**/*.bootstrap.ts,src/environments/*,src/assets/**/*,src/app/shared/generated/**/* \
              -Dsonar.test.inclusions=src/lib/**/*.spec.ts \
              -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          done
