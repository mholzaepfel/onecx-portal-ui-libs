name: My Test Monorepo Project

on:
  workflow_call:
    inputs:
      node:
        description: 'Node version'
        default: '20'
        required: false
        type: string

jobs:
  download-artefact:
    name: setup-sonar-and-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # setup node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node }}
          cache: 'npm'
      - uses: actions/download-artifact@v4

  sonarqubeScan1:
    name: SonarQubeScan1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_URL: 'https://sonarcloud.io'
        with:
          projectBaseDir: reports/accelerator/
          args: >
            SONAR_KEY="${GITHUB_REPOSITORY//\//_}"   
            OPS="-Dsonar.projectKey=$SONAR_KEY"
            OPS="$OPS -Dsonar.host.url=$SONAR_URL"
            OPS="$OPS -Dsonar.organization=${{ github.repository_owner }}"
            OPS="$OPS -Dsonar.sourceEncoding=UTF-8"
            OPS="$OPS -Dsonar.testExecutionReportPaths=./reports/accelerator/sonarqube_report.xml"
            OPS="$OPS -Dsonar.javascript.lcov.reportPaths=./reports/accelerator/coverage/lcov.info"          
            OPS="$OPS -Dsonar.javascript.maximumFunctionParameters=10"
            OPS="$OPS -Dsonar.typescript.maximumFunctionParameters=10"
            OPS="$OPS -Dsonar.cdp.javascript.maximumFunctionParameters=10"
            OPS="$OPS -Dsonar.cdp.typescript.maximumFunctionParameters=10"
            OPS="$OPS -Dsonar.coverage.exclusions=*.ts,*.js,src/*.ts,src/**/*.module.ts,src/**/*.main.ts,src/**/*.bootstrap.ts,src/environments/*,src/assets/**/*,src/app/shared/generated/**/*"
            OPS="$OPS -Dsonar.test.inclusions=src/lib/**/*.spec.ts"
            npx sonarqube-scanner $OPS -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  sonarqubeScan2:
    name: SonarQubeScan2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_URL: 'https://sonarcloud.io'
        with:
          projectBaseDir: reports/angular-accelerator/
          args: >
            SONAR_KEY="${GITHUB_REPOSITORY//\//_}"   
            OPS="-Dsonar.projectKey=$SONAR_KEY"
            OPS="$OPS -Dsonar.host.url=$SONAR_URL"
            OPS="$OPS -Dsonar.organization=${{ github.repository_owner }}"
            OPS="$OPS -Dsonar.sourceEncoding=UTF-8"
            OPS="$OPS -Dsonar.testExecutionReportPaths=./reports/angular-accelerator/sonarqube_report.xml"
            OPS="$OPS -Dsonar.javascript.lcov.reportPaths=./reports/angular-accelerator/coverage/lcov.info"          
            OPS="$OPS -Dsonar.javascript.maximumFunctionParameters=10"
            OPS="$OPS -Dsonar.typescript.maximumFunctionParameters=10"
            OPS="$OPS -Dsonar.cdp.javascript.maximumFunctionParameters=10"
            OPS="$OPS -Dsonar.cdp.typescript.maximumFunctionParameters=10"
            OPS="$OPS -Dsonar.coverage.exclusions=*.ts,*.js,src/*.ts,src/**/*.module.ts,src/**/*.main.ts,src/**/*.bootstrap.ts,src/environments/*,src/assets/**/*,src/app/shared/generated/**/*"
            OPS="$OPS -Dsonar.test.inclusions=src/lib/**/*.spec.ts"
            npx sonarqube-scanner $OPS -Dsonar.token=${{ secrets.SONAR_TOKEN }}
