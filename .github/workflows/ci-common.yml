name: ci-common

on:
  workflow_call:

jobs:
  lint-test-build-sonarUpload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - uses: nrwl/nx-set-shas@v3

      - name: Install deps
        run: npm ci

      - name: Lint affected
        run: |
          npx nx run-many -t lint -p accelerator angular-utils portal-integration-angular

      - name: Build affected
        run: |
          npx nx run-many -t build -p accelerator angular-utils portal-integration-angular

      - name: Test affected
        run: |
          npx nx run-many -t test -p accelerator angular-utils portal-integration-angular --watch=false --browsers=ChromeHeadless --coverage

      - run: pwd && ls -lsah

      - name: Upload Sonar artefacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: |
            package.json      
            libs/accelerator/reports/
            libs/angular-utils/reports/
            libs/portal-integration-angular/reports/
          retention-days: 1
          if-no-files-found: ignore
