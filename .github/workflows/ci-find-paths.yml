name: Monorepo SonarQube Analysis

on:
  workflow_call:

jobs:
  find-paths:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find project paths
        id: find-paths
        run: |
          paths=$(find libs -maxdepth 1 -mindepth 1 -type d -exec basename {} \;)
          if [ -f "$path" ]; then
            sed -i 's|^SF:|SF:/|' "$path"
            echo "Modified: $path"
          else
            echo "File not found: $path"
          fi
          done > lcov_paths.txt

          for path in $paths; do
            echo "$path"
          done > paths.txt

      - name: Upload paths file
        uses: actions/upload-artifact@v4
        with:
          name: paths-files
          path: |
            lcov_paths.txt
            paths.txt
          retention-days: 1
          if-no-files-found: ignore
