name: CI Push

on:
  workflow_dispatch:
  push:
    branches:
      - '*'
      - '*/*'
      - '**'

env:
  PATHS:

jobs:
  codeql:
    uses: onecx/ci-angular/.github/workflows/angular-codeql.yml@v1
    secrets: inherit

  ci-lint:
    uses: ./.github/workflows/ci-lint.yml
    secrets: inherit

  ci-build:
    uses: ./.github/workflows/ci-build.yml
    secrets: inherit

  ci-find-paths:
    uses: ./.github/workflow/ci-find-paths.yml
    secrets: inherit
    with:
      paths-to-libs: ${{ needs.find-paths.outputs.paths-to-libs}}

  ci-test:
    needs: ci-find-paths
    uses: ./.github/workflows/ci-test.yml
    secrets: inherit

  ci-mono-sonar1:
    needs: ci-test
    uses: ./.github/workflows/ci-mono-sonar1.yml
    secrets: inherit

  ci-mono-sonar2:
    needs: ci-test
    uses: ./.github/workflows/ci-mono-sonar2.yml
    secrets: inherit

  ci-mono-sonar3:
    needs: ci-test
    uses: ./.github/workflows/ci-mono-sonar3.yml
    secrets: inherit

  ci-mono-sonar4:
    needs: ci-test
    uses: ./.github/workflows/ci-mono-sonar4.yml
    secrets: inherit
